package com.ems.controller.admin;

import com.ems.model.Department;
import com.ems.service.DepartmentService;

import javafx.collections.FXCollections;
import javafx.fxml.FXML;
import javafx.scene.control.*;
import javafx.scene.control.cell.PropertyValueFactory;

public class ManageDepartmentsController {

    @FXML private TableView<Department> deptTable;
    @FXML private TableColumn<Department, Integer> colDeptId;
    @FXML private TableColumn<Department, String> colDeptName;
    @FXML private TextField deptNameField;
    @FXML private Label statusLabel;

    private final DepartmentService departmentService = new DepartmentService();

    @FXML
    public void initialize() {
        colDeptId.setCellValueFactory(new PropertyValueFactory<>("deptId"));
        colDeptName.setCellValueFactory(new PropertyValueFactory<>("deptName"));
        deptTable.getSelectionModel().selectedItemProperty().addListener((obs, oldV, d) -> {
            if (d != null) deptNameField.setText(d.getDeptName());
        });
        refreshTable();
    }

    private void refreshTable() {
        deptTable.setItems(FXCollections.observableArrayList(departmentService.getAll()));
    }

    @FXML
    private void handleAdd() {
        try {
            departmentService.add(deptNameField.getText());
            statusLabel.setText("Department added.");
            refreshTable();
            deptNameField.clear();
        } catch (Exception e) {
            statusLabel.setText(e.getMessage());
        }
    }

    @FXML
    private void handleUpdate() {
        Department selected = deptTable.getSelectionModel().getSelectedItem();
        if (selected == null) { statusLabel.setText("Select a department first."); return; }
        try {
            departmentService.rename(selected.getDeptId(), deptNameField.getText());
            statusLabel.setText("Department renamed.");
            refreshTable();
        } catch (Exception e) {
            statusLabel.setText(e.getMessage());
        }
    }

    @FXML
    private void handleDelete() {
        Department selected = deptTable.getSelectionModel().getSelectedItem();
        if (selected == null) { statusLabel.setText("Select a department first."); return; }
        try {
            departmentService.delete(selected.getDeptId());
            statusLabel.setText("Department deleted.");
            refreshTable();
            deptNameField.clear();
        } catch (Exception e) {
            statusLabel.setText("Cannot delete: " + e.getMessage());
        }
    }
}
